<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Course - LMS Portal</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <div class="container" style="max-width:750px;">
    <div class="page-header">
      <h1>Add New Course</h1>
      <p>Fill in the details below to publish a new course</p>
    </div>

    <div id="alertBox"></div>

    <form id="courseForm" style="background:var(--card);padding:26px;border-radius:var(--radius);border:1px solid var(--border);">
      <div class="form-group">
        <label>Course Title</label>
        <input type="text" id="title" required placeholder="e.g. Complete JavaScript Course">
      </div>
      <div class="form-group">
        <label>Category</label>
        <input type="text" id="category" required placeholder="e.g. Development, Design, Marketing">
      </div>
      <div class="form-group">
        <label>Instructor Name</label>
        <input type="text" id="instructor" required placeholder="e.g. Jane Smith">
      </div>
      <div class="form-group">
        <label>Price (USD)</label>
        <input type="number" id="price" required min="0" placeholder="e.g. 49">
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="description" required placeholder="What will students learn in this course?"></textarea>
      </div>

      <div class="form-group">
        <label>Course Modules</label>
        <div id="modulesWrap"></div>
        <button type="button" class="btn btn-secondary btn-sm" onclick="addModuleRow()">+ Add Module</button>
      </div>

      <button type="submit" class="btn btn-primary btn-block">Publish Course</button>
    </form>
  </div>

  <script src="js/app.js"></script>
  <script>
    requireAdmin();
    renderNavbar('manage');

    let moduleCount = 0;
    function addModuleRow(title=''){
      moduleCount++;
      const wrap = document.getElementById('modulesWrap');
      const row = document.createElement('div');
      row.style = 'display:flex;gap:8px;margin-bottom:8px;';
      row.innerHTML = `
        <input type="text" class="module-title" placeholder="Module ${moduleCount} title" value="${title}">
        <button type="button" class="btn btn-danger btn-sm" onclick="this.parentElement.remove()">✕</button>
      `;
      wrap.appendChild(row);
    }
    addModuleRow('Introduction');
    addModuleRow('Getting Started');

    document.getElementById('courseForm').addEventListener('submit', function(e){
      e.preventDefault();
      const titles = Array.from(document.querySelectorAll('.module-title'))
        .map(i => i.value.trim()).filter(Boolean);

      if(!titles.length){
        document.getElementById('alertBox').innerHTML = `<div class="alert alert-error">Add at least one module.</div>`;
        return;
      }

      const modules = titles.map((t, i) => ({
        id: 'm' + (i+1),
        title: t,
        videoTitle: t + ' - Video Lecture',
        materials: [t.replace(/\s+/g,'-') + '-notes.pdf']
      }));

      addCourse({
        title: document.getElementById('title').value.trim(),
        category: document.getElementById('category').value.trim(),
        instructor: document.getElementById('instructor').value.trim(),
        price: Number(document.getElementById('price').value),
        description: document.getElementById('description').value.trim(),
        modules
      });

      document.getElementById('alertBox').innerHTML = `<div class="alert alert-success">Course published successfully! Redirecting...</div>`;
      setTimeout(() => window.location.href = 'courses.html', 1000);
    });
  </script>
</body>
</html>
