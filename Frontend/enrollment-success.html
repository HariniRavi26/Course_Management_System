<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Enrollment Successful - LMS Portal</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <div class="auth-wrap">
    <div class="auth-card" style="text-align:center;max-width:480px;">
      <div style="font-size:56px;margin-bottom:10px;">🎉</div>
      <h2>Enrollment Successful!</h2>
      <p class="sub" id="courseMsg">You're all set to start learning.</p>
      <div style="display:flex;gap:10px;margin-top:20px;">
        <a href="my-courses.html" class="btn btn-secondary" style="flex:1;">My Courses</a>
        <a href="#" id="startBtn" class="btn btn-primary" style="flex:1;">Start Learning</a>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    const user = requireAuth();
    renderNavbar();
    const params = new URLSearchParams(window.location.search);
    const course = getCourseById(params.get('id'));
    if(course){
      document.getElementById('courseMsg').textContent = `You've successfully enrolled in "${course.title}".`;
      document.getElementById('startBtn').href = `course-content.html?id=${course.id}`;
    }
  </script>
</body>
</html>
