<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forgot Password - LMS Portal</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <div class="auth-wrap">
    <div class="auth-card">
      <h2>Forgot Password</h2>
      <p class="sub">Enter your email and we'll help you reset it</p>

      <div id="alertBox"></div>

      <form id="forgotForm">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" required placeholder="you@example.com">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Send Reset Link</button>
      </form>

      <div class="switch"><a href="login.html">Back to Login</a></div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    renderNavbar();
    document.getElementById('forgotForm').addEventListener('submit', function(e){
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const users = getData(DB.users);
      const box = document.getElementById('alertBox');

      if(!users.some(u => u.email === email)){
        box.innerHTML = `<div class="alert alert-error">No account found with that email.</div>`;
        return;
      }
      // In a real app this would email a secure token link.
      // For this demo, we pass the email through to the reset page.
      box.innerHTML = `<div class="alert alert-success">Email found! Redirecting to reset password...</div>`;
      setTimeout(() => window.location.href = `reset-password.html?email=${encodeURIComponent(email)}`, 1000);
    });
  </script>
</body>
</html>
