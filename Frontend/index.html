<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LMS Portal - Learn Anything, Anytime</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <header style="background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;padding:70px 20px;text-align:center;">
    <h1 style="font-size:36px;margin-bottom:14px;">Learn New Skills, Anytime, Anywhere</h1>
    <p style="font-size:16px;opacity:.9;max-width:600px;margin:0 auto 26px;">
      Join thousands of learners on our course management portal. Browse courses, track your progress and earn certificates.
    </p>
    <a href="browse-courses.html" class="btn" style="background:#fff;color:var(--primary);">Browse Courses</a>
    <a href="register.html" class="btn" style="background:rgba(255,255,255,.15);color:#fff;border:1px solid #fff;">Get Started Free</a>
  </header>

  <div class="container">
    <div class="page-header" style="text-align:center;">
      <h1>Featured Courses</h1>
      <p>Hand-picked courses to help you get started</p>
    </div>
    <div class="grid grid-3" id="featuredCourses"></div>
  </div>

  <div class="footer-note">© 2026 LMS Portal. Built for learning.</div>

  <script src="js/app.js"></script>
  <script>
    renderNavbar('home');
    const courses = getCourses().slice(0,3);
    document.getElementById('featuredCourses').innerHTML = courses.map(c => `
      <div class="card">
        <div class="card-thumb">${c.title.charAt(0)}</div>
        <div class="card-body">
          <span class="tag">${c.category}</span>
          <h3 style="margin:10px 0 6px;">${c.title}</h3>
          <p style="color:var(--muted);font-size:14px;">By ${c.instructor}</p>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:14px;">
            <span class="price">$${c.price}</span>
            <a href="course-details.html?id=${c.id}" class="btn btn-primary btn-sm">View Course</a>
          </div>
        </div>
      </div>
    `).join('');
  </script>
</body>
</html>
