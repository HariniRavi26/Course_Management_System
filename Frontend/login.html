<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - LMS Portal</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <div class="auth-wrap">
    <div class="auth-card">
      <h2>Welcome Back</h2>
      <p class="sub">Login to continue learning</p>

      <div id="alertBox"></div>
      <div class="alert alert-info" style="font-size:13px;">
        Demo logins — Student: <b>student@lms.com / student123</b><br>Admin: <b>admin@lms.com / admin123</b>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required placeholder="Your password">
        </div>
        <div style="text-align:right;margin-bottom:16px;">
          <a href="forgot-password.html" style="font-size:13px;color:var(--primary);">Forgot Password?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Login</button>
      </form>

      <div class="switch">Don't have an account? <a href="register.html">Register here</a></div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    renderNavbar();
    document.getElementById('loginForm').addEventListener('submit', function(e){
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const result = loginUser(email, password);
      const box = document.getElementById('alertBox');
      if(!result.ok){
        box.innerHTML = `<div class="alert alert-error">${result.message}</div>`;
        return;
      }
      window.location.href = result.user.role === 'admin' ? 'admin-dashboard.html' : 'student-dashboard.html';
    });
  </script>
</body>
</html>
