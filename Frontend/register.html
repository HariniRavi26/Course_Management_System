<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register - LMS Portal</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <div class="auth-wrap">
    <div class="auth-card">
      <h2>Create Account</h2>
      <p class="sub">Sign up to start learning today</p>

      <div id="alertBox"></div>

      <form id="registerForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="name" required placeholder="John Doe">
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required minlength="6" placeholder="At least 6 characters">
        </div>
        <div class="form-group">
          <label>I am registering as</label>
          <select id="role">
            <option value="student">Student</option>
            <option value="admin">Admin / Instructor</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Create Account</button>
      </form>

      <div class="switch">Already have an account? <a href="login.html">Login here</a></div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    renderNavbar();
    document.getElementById('registerForm').addEventListener('submit', function(e){
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const role = document.getElementById('role').value;

      const result = registerUser(name, email, password, role);
      const box = document.getElementById('alertBox');
      if(!result.ok){
        box.innerHTML = `<div class="alert alert-error">${result.message}</div>`;
        return;
      }
      box.innerHTML = `<div class="alert alert-success">Account created! Redirecting to login...</div>`;
      setTimeout(() => window.location.href = 'login.html', 1200);
    });
  </script>
</body>
</html>
