<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reset Password - LMS Portal</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <div class="auth-wrap">
    <div class="auth-card">
      <h2>Reset Password</h2>
      <p class="sub">Create a new password for your account</p>

      <div id="alertBox"></div>

      <form id="resetForm">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label>New Password</label>
          <input type="password" id="password" required minlength="6" placeholder="At least 6 characters">
        </div>
        <div class="form-group">
          <label>Confirm New Password</label>
          <input type="password" id="confirmPassword" required placeholder="Re-enter password">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Reset Password</button>
      </form>

      <div class="switch"><a href="login.html">Back to Login</a></div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    renderNavbar();
    const params = new URLSearchParams(window.location.search);
    if(params.get('email')) document.getElementById('email').value = params.get('email');

    document.getElementById('resetForm').addEventListener('submit', function(e){
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;
      const box = document.getElementById('alertBox');

      if(password !== confirm){
        box.innerHTML = `<div class="alert alert-error">Passwords do not match.</div>`;
        return;
      }
      const result = resetPasswordFor(email, password);
      if(!result.ok){
        box.innerHTML = `<div class="alert alert-error">${result.message}</div>`;
        return;
      }
      box.innerHTML = `<div class="alert alert-success">Password reset! Redirecting to login...</div>`;
      setTimeout(() => window.location.href = 'login.html', 1200);
    });
  </script>
</body>
</html>
