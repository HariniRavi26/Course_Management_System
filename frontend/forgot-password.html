<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forgot Password - LMS Portal</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="brand"><a href="index.html">📚 LMS Portal</a></div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="browse-courses.html">Courses</a>
      <a href="login.html" class="btn btn-secondary btn-sm">Login</a>
      <a href="register.html" class="btn btn-primary btn-sm">Sign Up</a>
    </div>
  </nav>

  <div class="auth-wrap">
    <div class="auth-card">
      <h2>Forgot Password</h2>
      <p class="sub">Enter your email and we'll help you reset it</p>

      <form action="reset-password.html" method="get">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" required placeholder="you@example.com">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Send Reset Link</button>
      </form>

      <div class="switch"><a href="login.html">Back to Login</a></div>
    </div>
  </div>
</body>
</html>
