<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - LMS Portal</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="brand"><a href="index.html">📚 LMS Portal</a></div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="browse-courses.html">Courses</a>
      <a href="login.html" class="btn btn-secondary btn-sm">Login</a>
      <a href="register.html" class="btn btn-primary btn-sm">Sign Up</a>
    </div>
  </nav>

  <div class="auth-wrap">
    <div class="auth-card">
      <h2>Welcome Back</h2>
      <p class="sub">Login to continue learning</p>

      <div class="alert alert-info" style="font-size:13px;">
        Demo: use any email/password. Choose <b>student-dashboard.html</b> or <b>admin-dashboard.html</b> to preview either role.
      </div>

      <form action="student-dashboard.html" method="get">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" required placeholder="Your password">
        </div>
        <div style="text-align:right;margin-bottom:16px;">
          <a href="forgot-password.html" style="font-size:13px;color:var(--primary);">Forgot Password?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Login as Student</button>
      </form>
      <a href="admin-dashboard.html" class="btn btn-secondary btn-block" style="margin-top:10px;">Login as Admin (Preview)</a>

      <div class="switch">Don't have an account? <a href="register.html">Register here</a></div>
    </div>
  </div>
</body>
</html>
