<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register - LMS Portal</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="brand"><a href="index.html">📚 LMS Portal</a></div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="browse-courses.html">Courses</a>
      <a href="login.html" class="btn btn-secondary btn-sm">Login</a>
      <a href="register.html" class="btn btn-primary btn-sm">Sign Up</a>
    </div>
  </nav>

  <div class="auth-wrap">
    <div class="auth-card">
      <h2>Create Account</h2>
      <p class="sub">Sign up to start learning today</p>

      <form action="student-dashboard.html" method="get">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="name" required placeholder="John Doe">
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" required minlength="6" placeholder="At least 6 characters">
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" name="confirmPassword" required placeholder="Re-enter password">
        </div>
        <div class="form-group">
          <label>I am registering as</label>
          <select name="role">
            <option value="student">Student</option>
            <option value="admin">Admin / Instructor</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Create Account</button>
      </form>

      <div class="switch">Already have an account? <a href="login.html">Login here</a></div>
    </div>
  </div>
</body>
</html>
