<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reset Password - LMS Portal</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="brand"><a href="index.html">📚 LMS Portal</a></div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="browse-courses.html">Courses</a>
      <a href="login.html" class="btn btn-secondary btn-sm">Login</a>
      <a href="register.html" class="btn btn-primary btn-sm">Sign Up</a>
    </div>
  </nav>

  <div class="auth-wrap">
    <div class="auth-card">
      <h2>Reset Password</h2>
      <p class="sub">Create a new password for your account</p>

      <div class="alert alert-success">Email verified! Set a new password below.</div>

      <form action="login.html" method="get">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label>New Password</label>
          <input type="password" name="password" required minlength="6" placeholder="At least 6 characters">
        </div>
        <div class="form-group">
          <label>Confirm New Password</label>
          <input type="password" name="confirmPassword" required placeholder="Re-enter password">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Reset Password</button>
      </form>

      <div class="switch"><a href="login.html">Back to Login</a></div>
    </div>
  </div>
</body>
</html>
